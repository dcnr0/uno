<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uno arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --u-blue: #00b4d8;
            --n-green: #2ecc71;
            --o-red: #e74c3c;
            --y-yellow: #f1c40f;
            --card-shadow: 0 16px 0px rgba(0, 0, 0, 0.4);
            --card-shadow-hover: 0 8px 0px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka One', cursive;
            background: radial-gradient(circle at center, #1e293b 0%, #090d16 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            perspective: 1200px; 
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(rgba(18, 24, 38, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 100% 4px, 40px 40px, 40px 40px;
            z-index: 2;
            pointer-events: none;
        }

        .bg-shape {
            position: absolute;
            background: linear-gradient(135deg, rgba(255,255,255,0.03), transparent);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            pointer-events: none;
            z-index: 1;
        }
        .shape-1 { width: 120px; height: 180px; top: 10%; left: 8%; transform: rotate(15deg); animation: float1 14s infinite ease-in-out; }
        .shape-2 { width: 150px; height: 220px; bottom: 10%; right: 8%; transform: rotate(-20deg); animation: float2 18s infinite ease-in-out; }
        .shape-3 { width: 90px; height: 90px; border-radius: 50%; top: 70%; left: 15%; animation: float1 11s infinite ease-in-out; }
        .shape-4 { width: 100px; height: 100px; top: 20%; right: 18%; transform: rotate(45deg); animation: float2 15s infinite ease-in-out; }

        @keyframes float1 {
            0%, 100% { transform: translateY(0) rotate(15deg) scale(1); }
            50% { transform: translateY(-25px) rotate(25deg) scale(1.05); }
        }
        @keyframes float2 {
            0%, 100% { transform: translateY(0) rotate(-20deg) scale(1); }
            50% { transform: translateY(30px) rotate(-10deg) scale(0.95); }
        }

        #flashOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
        }
        .flash-active {
            animation: flashFadeOut 0.6s ease-out forwards;
        }
        @keyframes flashFadeOut {
            0% { opacity: 1; filter: blur(0px); }
            100% { opacity: 0; filter: blur(10px); }
        }

        #clickZone {
            position: fixed;
            inset: 0;
            background: rgba(8, 12, 21, 0.85);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .click-card-frame {
            padding: 40px 60px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .click-card-frame::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            animation: shine 3s infinite;
        }
        @keyframes shine { 100% { transform: translateX(100%); } }

        #clickZone i {
            font-size: 50px;
            color: var(--u-blue);
            margin-bottom: 20px;
            animation: bounceIcon 2s infinite ease-in-out;
        }
        #clickZone h2 {
            font-size: 26px;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        @keyframes bounceIcon {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            text-align: center;
            display: none;
        }

        h1 {
            font-size: clamp(45px, 8vw, 85px);
            margin-bottom: 55px;
            letter-spacing: 2px;
            color: #1e293b;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 14px;
        }

        h1 span {
            display: inline-block;
            opacity: 0;
            transform: scale(0.2);
            text-shadow: 
                -5px -5px 0 #fff,  5px -5px 0 #fff, -5px  5px 0 #fff,  5px  5px 0 #fff,
                -5px  0px 0 #fff,  5px  0px 0 #fff,  0px -5px 0 #fff,  0px  5px 0 #fff,
                0px 16px 24px rgba(0,0,0,0.7);
        }

        h1 span.pop-in {
            animation: letterPop 0.45s cubic-bezier(0.34, 1.75, 0.64, 1) forwards;
        }

        #word-UNO { display: inline-block; }
        #word-UNO.pop-in {
            animation: letterPop 0.45s cubic-bezier(0.34, 1.75, 0.64, 1) forwards, 
                       unoChoppyLoop 1.0s steps(1) infinite;
            animation-delay: 0s, 0.45s;
        }

        #word-UNO span {
            opacity: 1;
            transform: none;
            text-shadow: 
                -4px -4px 0 #000,  4px -4px 0 #000, -4px  4px 0 #000,  4px  4px 0 #000,
                -4px  0px 0 #000,  4px  0px 0 #000,  0px -4px 0 #000,  0px  4px 0 #000,
                0px 10px 20px rgba(0,0,0,0.6);
        }

        .u-blue { color: var(--u-blue); }
        .n-green { color: var(--n-green); }
        .o-red { color: var(--o-red); }

        @keyframes letterPop {
            0% { transform: scale(0.2) translateY(40px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes unoChoppyLoop {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        .view-panel {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            justify-content: center;
            max-width: 750px;
            margin: 0 auto;
            transform-style: preserve-3d;
        }

        .view-panel.centered-layout {
            grid-template-columns: 1fr;
            max-width: 500px;
        }

        .view-panel.active-view {
            display: grid;
        }

        .game-card {
            background: #ffffff;
            color: #0f172a;
            border-radius: 28px;
            padding: 40px 25px;
            border: 6px solid #ffffff;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 220px;
            overflow: hidden;
            opacity: 0;
            transform: rotateX(-90deg) translateY(80px);
            transform-origin: top center;
            backface-visibility: hidden;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .game-card::after {
            content: 'UNO';
            position: absolute;
            bottom: -15px;
            right: -10px;
            font-size: 44px;
            opacity: 0.06;
            transform: rotate(-15deg);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .game-card:hover::after { transform: scale(1.2) rotate(-25deg); opacity: 0.12; }

        .reveal-cards .game-card {
            animation: cardFlipIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
        }
        .reveal-cards .game-card:nth-child(1) { animation-delay: 0.1s; }
        .reveal-cards .game-card:nth-child(2) { animation-delay: 0.2s; }
        .reveal-cards .game-card:nth-child(3) { animation-delay: 0.3s; }

        .game-card::before {
            content: '';
            position: absolute;
            inset: 12px;
            border: 3px dashed rgba(15, 23, 42, 0.12);
            border-radius: 18px;
            pointer-events: none;
            transition: inset 0.2s ease;
        }
        .game-card:hover::before { inset: 8px; }

        .game-card i, .game-card .numeric {
            font-size: 52px;
            margin-bottom: 20px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.5);
            display: block;
        }
        .game-card span { font-size: 22px; display: block; font-weight: bold; }

        .card-blue  { border-color: var(--u-blue);   color: var(--u-blue); }
        .card-green { border-color: var(--n-green);  color: var(--n-green); }
        .card-red   { border-color: var(--o-red);    color: var(--o-red); }
        .card-yellow{ border-color: var(--y-yellow); color: var(--y-yellow); }

        .game-card:hover { transform: translateY(8px) scale(1.02) !important; box-shadow: var(--card-shadow-hover); }
        .game-card:hover i { transform: scale(1.2) rotate(-8deg); }
        .game-card:hover .numeric { transform: scale(1.2) translateY(-4px); }
        .game-card:active { transform: translateY(16px) scale(0.99) !important; box-shadow: 0 0px 0 transparent; }

        .form-panel {
            background: #ffffff;
            border-radius: 32px;
            padding: 35px;
            color: #0f172a;
            border: 6px solid var(--u-blue);
            box-shadow: var(--card-shadow);
            text-align: center;
            opacity: 0;
            transform: scale(0.8) translateY(40px);
        }
        .reveal-cards .form-panel {
            animation: panelFadePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
        }
        @keyframes panelFadePop {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .form-panel h3 { font-size: 26px; margin-bottom: 15px; color: #1e293b; letter-spacing: 0.5px; }

        .input-group {
            position: relative;
            margin: 15px 0 20px 0;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #475569;
            margin-bottom: 6px;
            padding-left: 4px;
        }
        .room-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 18px;
            border-radius: 16px;
            border: 4px solid #cbd5e1;
            font-family: 'Fredoka One', cursive;
            text-align: center;
            letter-spacing: 1px;
            color: #0f172a;
            outline: none;
            transition: border-color 0.2s ease;
        }
        .room-input:focus { border-color: var(--u-blue); }
        .room-input::placeholder { color: #cbd5e1; font-size: 16px; }

        .file-upload-container {
            background: #f8fafc;
            border: 3px dashed #cbd5e1;
            border-radius: 16px;
            padding: 15px;
            position: relative;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.2s ease;
            margin-bottom: 20px;
        }
        .file-upload-container:hover { border-color: var(--u-blue); }
        .file-upload-container input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }
        .file-upload-text { font-size: 14px; color: #64748b; }

        .btn-action {
            width: 100%;
            background: var(--n-green);
            color: white;
            border: none;
            padding: 16px;
            font-family: 'Fredoka One', cursive;
            font-size: 22px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 0 #16a34a;
            transition: all 0.1s ease;
        }
        .btn-action:hover { transform: translateY(2px); box-shadow: 0 4px 0 #16a34a; }
        .btn-action:active { transform: translateY(6px); box-shadow: 0 0px 0 transparent; }

        .back-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            opacity: 0;
        }
        .reveal-cards .back-container { animation: fadeInElement 0.4s ease forwards; animation-delay: 0.4s; }

        .btn-back {
            background: linear-gradient(135deg, #475569, #334155);
            color: #ffffff;
            border: 3px solid rgba(255,255,255,0.1);
            padding: 16px 45px;
            font-family: 'Fredoka One', cursive;
            font-size: 18px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 0 #1e293b;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-back:hover { transform: translateY(2px); box-shadow: 0 4px 0 #1e293b; background: linear-gradient(135deg, #64748b, #475569); }
        .btn-back:active { transform: translateY(6px); box-shadow: 0 0px 0 transparent; }

        /* Arena Gameplay Panels */
        .arena-panel {
            background: rgba(15, 23, 42, 0.75);
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 25px;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: none;
        }
        .arena-status {
            font-size: 16px;
            color: #cbd5e1;
            background: rgba(0,0,0,0.4);
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .arena-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .arena-node {
            background: #1e293b;
            border: 4px solid #334155;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            position: relative;
            transition: border-color 0.2s ease;
        }
        .arena-node.active-turn {
            border-color: var(--u-blue);
            animation: pulseActiveBorder 1.5s infinite alternate;
        }
        @keyframes pulseActiveBorder {
            from { border-color: var(--u-blue); box-shadow: 0 0 4px var(--u-blue); }
            to { border-color: #00f5ff; box-shadow: 0 0 16px #00f5ff; }
        }
        .node-name {
            font-size: 14px;
            font-weight: bold;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .node-avatar-frame {
            width: 55px;
            height: 55px;
            margin: 8px auto;
            border-radius: 50%;
            border: 3px solid #475569;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .node-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .node-avatar-fallback {
            font-size: 22px;
            color: #94a3b8;
        }
        .node-count {
            font-size: 12px;
            color: #94a3b8;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 4px;
        }
        .arena-table {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }
        .arena-deck-pile {
            width: 85px;
            height: 130px;
            border-radius: 14px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: 4px solid #fff;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
            transform: rotate(-5deg);
            transition: transform 0.2s ease;
        }
        .arena-deck-pile:hover {
            transform: scale(1.05) rotate(-2deg);
        }
        .arena-discard {
            width: 85px;
            height: 130px;
            border-radius: 14px;
            border: 5px solid #ffffff;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            transition: background 0.3s ease;
        }
        .arena-hand-container {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .arena-hand-title {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .arena-hand-cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .arena-card {
            width: 75px;
            height: 115px;
            background: #ffffff;
            border-radius: 12px;
            border: 4px solid #ffffff;
            color: #0f172a;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 0px rgba(0,0,0,0.3);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .arena-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 14px 0px rgba(0,0,0,0.3);
        }
        
        /* Card Background Colors mapping */
        .color-blue { background-color: var(--u-blue) !important; color: white !important; }
        .color-green { background-color: var(--n-green) !important; color: white !important; }
        .color-red { background-color: var(--o-red) !important; color: white !important; }
        .color-yellow { background-color: var(--y-yellow) !important; color: black !important; }
        .color-wild { background-color: #2c3e50 !important; color: white !important; border-color: #8e44ad !important;}

        /* Color Overlay Modals */
        #colorPickerModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 20000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .picker-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 25px;
            background: #1e293b;
            border-radius: 24px;
            border: 3px solid rgba(255,255,255,0.1);
        }
        .picker-btn {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            cursor: pointer;
            border: none;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
        }

        @keyframes cardFlipIn {
            0% { opacity: 0; transform: rotateX(-90deg) translateY(80px); }
            100% { opacity: 1; transform: rotateX(0deg) translateY(0); }
        }
        @keyframes fadeInElement {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="flashOverlay"></div>

    <div id="clickZone" onclick="startCinematicIntro()">
        <div class="click-card-frame">
            <i class="fas fa-gamepad"></i>
            <h2>CLICK ANYWHERE TO ENTER</h2>
        </div>
    </div>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>
    <div class="bg-shape shape-4"></div>

    <div class="container" id="gameContainer">
        <h1 id="titleHeader">
            <span id="letter-E">E</span>
            <span id="letter-L">L</span>
            <span id="letter-I">I</span>
            <span id="letter-A">A</span>
            <span id="letter-S">S'S</span>
            <span style="width: 25px;"></span>
            <span id="word-UNO">
                <span class="u-blue">U</span><span class="n-green">N</span><span class="o-red">O</span>
            </span>
        </h1>

        <div id="mainMenu" class="view-panel active-view">
            <div class="game-card card-blue" onclick="switchView('botsMenu')">
                <i class="fas fa-robot"></i>
                <span>Play With Bots</span>
            </div>
            <div class="game-card card-green" onclick="switchView('onlineMenu')">
                <i class="fas fa-globe"></i>
                <span>Play Online</span>
            </div>
        </div>

        <div id="botsMenu" class="view-panel">
            <div class="game-card card-blue" onclick="switchView('profileSetupMenu')">
                <span class="numeric"><i class="fas fa-user-plus"></i></span>
                <span>Configure Profile Match</span>
            </div>
            <div class="back-container">
                <button class="btn-back" onclick="switchView('mainMenu')"><i class="fas fa-arrow-left"></i> Back</button>
            </div>
        </div>

        <div id="profileSetupMenu" class="view-panel centered-layout">
            <div class="form-panel">
                <h3>Match Profile Identity</h3>
                <div class="input-group">
                    <label>In-game Tag Handle</label>
                    <input type="text" id="usernameInput" class="room-input" placeholder="Leave empty for Guest...">
                </div>
                <div class="input-group">
                    <label>Profile Email (Verified Verification Check)</label>
                    <input type="email" id="emailInput" class="room-input" placeholder="yourname@domain.com">
                </div>
                <div class="input-group">
                    <label>Custom Profile Picture File</label>
                    <div class="file-upload-container">
                        <span class="file-upload-text" id="uploadLabelText">Select Custom Image Asset...</span>
                        <input type="file" id="avatarFileInput" accept="image/*" onchange="processAvatarUpload(this)">
                    </div>
                </div>
                <button class="btn-action" onclick="launchBotMatchEngine()">INITIALIZE MATCH</button>
            </div>
            <div class="back-container">
                <button class="btn-back" onclick="switchView('botsMenu')"><i class="fas fa-arrow-left"></i> Back</button>
            </div>
        </div>

        <div id="onlineMenu" class="view-panel centered-layout">
            <div class="form-panel">
                <h3>Online Servers Currently Full</h3>
                <p style="color: #64748b; margin-bottom: 20px;">Standard matching networks are currently occupied.</p>
                <button class="btn-action" onclick="switchView('mainMenu')">RETURN TO THE HUB</button>
            </div>
        </div>

        <div id="arenaPanel" class="arena-panel">
            <div class="arena-status" id="statusBox">Awaiting initialization variables...</div>
            <div class="arena-grid" id="playersGrid">
                </div>
            <div class="arena-table">
                <div class="arena-deck-pile" onclick="drawCardFromDeck()">DECK</div>
                <div class="arena-discard" id="discardPileCard"></div>
            </div>
            <div class="arena-hand-container">
                <div class="arena-hand-title">Your Playable Hand</div>
                <div class="arena-hand-cards" id="playerHandCards">
                    </div>
            </div>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn-back" style="flex: 1; padding: 12px;" onclick="terminateMatchSession()">Forfeit Match</button>
            </div>
        </div>

    </div>

    <div id="colorPickerModal">
        <div class="picker-grid">
            <button class="picker-btn color-blue" onclick="selectWildColor('blue')"></button>
            <button class="picker-btn color-green" onclick="selectWildColor('green')"></button>
            <button class="picker-btn color-red" onclick="selectWildColor('red')"></button>
            <button class="picker-btn color-yellow" onclick="selectWildColor('yellow')"></button>
        </div>
    </div>

    <script>
        let currentUploadedAvatarBase64 = "";
        let localPlayerHandReference = [];
        let internalSelectedCardIndex = null;
        let aiExecutionInterval = null;

        function startCinematicIntro() {
            const overlay = document.getElementById('flashOverlay');
            overlay.classList.add('flash-active');
            
            document.getElementById('clickZone').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            
            // Pop letters matching standard structure styling rules
            const elements = document.querySelectorAll('h1 span');
            elements.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('pop-in');
                }, index * 90);
            });
            
            setTimeout(() => {
                document.getElementById('mainMenu').classList.add('reveal-cards');
            }, 600);
        }

        function switchView(viewId) {
            const panels = document.querySelectorAll('.view-panel, .arena-panel');
            panels.forEach(p => {
                p.classList.remove('active-view', 'reveal-cards');
                p.style.display = 'none';
            });
            
            const target = document.getElementById(viewId);
            if (target) {
                target.style.display = target.classList.contains('arena-panel') ? 'block' : 'grid';
                setTimeout(() => {
                    target.classList.add('active-view', 'reveal-cards');
                }, 50);
            }
        }

        function processAvatarUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentUploadedAvatarBase64 = e.target.result;
                    document.getElementById('uploadLabelText').innerText = "Custom Asset Loaded Successfully!";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function launchBotMatchEngine() {
            const payload = {
                username: document.getElementById('usernameInput').value,
                email: document.getElementById('emailInput').value,
                avatar_source: currentUploadedAvatarBase64
            };

            fetch('/api/start_game', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(state => {
                switchView('arenaPanel');
                renderGameState(state);
                initiateAIClockLoop();
            });
        }

        function renderGameState(state) {
            document.getElementById('statusBox').innerText = state.status_message;
            
            // Render active arena dashboard entities tracking counts
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = "";
            
            state.players.forEach((p, idx) => {
                const node = document.createElement('div');
                node.className = `arena-node ${state.current_turn === idx ? 'active-turn' : ''}`;
                
                let imageElementHtml = `<div class="node-avatar-fallback"><i class="fas fa-user-robot"></i></div>`;
                if(p.avatar && p.avatar.length > 5) {
                    imageElementHtml = `<img src="${p.avatar}" class="node-avatar-img" />`;
                }
                
                node.innerHTML = `
                    <span class="node-name">${p.name} ${p.is_owner ? '👑' : ''}</span>
                    <div class="node-avatar-frame">${imageElementHtml}</div>
                    <span class="node-count">${p.card_count} Cards</span>
                `;
                grid.appendChild(node);
            });

            // Update top discard pile node parameters
            const topDiscard = state.top_discard;
            const discardNode = document.getElementById('discardPileCard');
            if (topDiscard) {
                discardNode.className = `arena-discard color-${topDiscard.color}`;
                discardNode.innerText = topDiscard.value;
            } else {
                discardNode.className = "arena-discard";
                discardNode.innerText = "";
            }

            // Repopulate interactive player inventory fields
            const handContainer = document.getElementById('playerHandCards');
            handContainer.innerHTML = "";
            localPlayerHandReference = state.players[0].hand || [];

            localPlayerHandReference.forEach((card, index) => {
                const cardButton = document.createElement('div');
                cardButton.className = `arena-card color-${card.color}`;
                cardButton.innerText = card.value;
                cardButton.onclick = () => attemptToPlayCard(index);
                handContainer.appendChild(cardButton);
            });

            if (state.game_over) {
                clearInterval(aiExecutionInterval);
                alert(`Match Concluded! Winner: ${state.winner}`);
                terminateMatchSession();
            }
        }

        function attemptToPlayCard(index) {
            const card = localPlayerHandReference[index];
            if (!card) return;

            if (card.color === 'wild') {
                internalSelectedCardIndex = index;
                document.getElementById('colorPickerModal').style.display = 'flex';
            } else {
                executePlayAction(index, null);
            }
        }

        function selectWildColor(color) {
            document.getElementById('colorPickerModal').style.display = 'none';
            if (internalSelectedCardIndex !== null) {
                executePlayAction(internalSelectedCardIndex, color);
                internalSelectedCardIndex = null;
            }
        }

        function executePlayAction(cardIdx, color) {
            fetch('/api/play_card', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    player_idx: 0,
                    card_idx: cardIdx,
                    chosen_color: color
                })
            })
            .then(res => {
                if (!res.ok) return res.json().then(err => { throw new Error(err.error) });
                return res.json();
            })
            .then(state => {
                renderGameState(state);
            })
            .catch(err => alert(err.message));
        }

        function drawCardFromDeck() {
            fetch('/api/draw_card', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player_idx: 0 })
            })
            .then(res => res.json())
            .then(state => {
                renderGameState(state);
            });
        }

        function initiateAIClockLoop() {
            clearInterval(aiExecutionInterval);
            aiExecutionInterval = setInterval(() => {
                // Poll backend check logic to ascertain if automated entities hold authority
                fetch('/api/ai_turn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(res => {
                    if (res.ok) return res.json().then(state => renderGameState(state));
                });
            }, 3000);
        }

        function terminateMatchSession() {
            clearInterval(aiExecutionInterval);
            switchView('mainMenu');
        }
    </script>
</body>
</html>
