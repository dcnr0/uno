<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uno</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #d4d4d4;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 40px auto;
            background: #000000;
            padding: 30px;
            border: 1px solid #222222;
        }
        h1 {
            color: #e51c23;
            font-size: 1.8em;
            letter-spacing: -1px;
            margin-top: 0;
            text-transform: lowercase;
        }
        p {
            font-size: 0.9em;
            color: #888888;
            margin: 15px 0;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
            width: 85%;
            margin-left: auto;
            margin-right: auto;
        }
        label {
            display: block;
            font-size: 0.8em;
            color: #666666;
            margin-bottom: 5px;
            text-transform: lowercase;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 10px;
            background: #111111;
            border: 1px solid #262626;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            outline: none;
        }
        input[type="text"]:focus, input[type="email"]:focus {
            border-color: #444444;
        }
        .file-upload-wrapper {
            position: relative;
            background: #111111;
            border: 1px dashed #262626;
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }
        .file-upload-wrapper:hover {
            border-color: #444444;
        }
        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-label-text {
            font-size: 0.8em;
            color: #666666;
            text-transform: lowercase;
        }
        button {
            background: #000000;
            color: #ffffff;
            border: 1px solid #e51c23;
            padding: 10px 24px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            text-transform: lowercase;
            margin-top: 10px;
            transition: background 0.15s ease;
        }
        button:hover {
            background: #e51c23;
            color: #000000;
        }
        .hidden {
            display: none !important;
        }
        /* Arena Layout Styles */
        .status-box {
            font-size: 0.85em;
            color: #888888;
            border: 1px solid #1a1a1a;
            padding: 12px;
            margin-bottom: 25px;
            background: #050505;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .player-node {
            background: #0a0a0a;
            border: 1px solid #1f1f1f;
            padding: 10px;
            position: relative;
        }
        .player-node.active-turn {
            border-color: #e51c23;
        }
        .player-name {
            font-size: 0.8em;
            font-weight: bold;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .owner-tag {
            color: #ffb300;
            font-size: 0.7em;
            display: block;
            margin-top: 2px;
        }
        .avatar-frame {
            width: 50px;
            height: 50px;
            margin: 8px auto;
            border: 1px solid #262626;
            background: #111111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-fallback {
            font-size: 0.9em;
            color: #555555;
        }
        .card-count {
            font-size: 0.75em;
            color: #666666;
            display: block;
        }
        .table-center {
            background: #050505;
            border: 1px solid #161616;
            padding: 25px;
            margin-bottom: 25px;
        }
        .discard-card {
            display: inline-block;
            width: 70px;
            height: 105px;
            border: 1px solid #333333;
            background: #000000;
            line-height: 105px;
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
        }
        .hand-container {
            text-align: center;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #1c1c1c;
            min-height: 140px;
            margin-bottom: 15px;
        }
        .hand-cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .game-card {
            width: 65px;
            height: 95px;
            background: #000000;
            border: 1px solid #333333;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            font-weight: bold;
            cursor: pointer;
            padding: 2px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .game-card:hover {
            border-color: #ffffff !important;
            transform: translateY(-4px);
        }
        .action-bar {
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="lobby-screen" class="container">
        <h1>uno lobby</h1>
        <p>enter configurations to join the arena match:</p>
        
        <div class="form-group" style="margin-top: 25px;">
            <label for="usernameInput">display name</label>
            <input type="text" id="usernameInput" placeholder="guest username" autocomplete="off">
        </div>
        
        <div class="form-group">
            <label for="emailInput">email configuration (optional)</label>
            <input type="email" id="emailInput" placeholder="owner or player verification" autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>custom profile avatar image</label>
            <div class="file-upload-wrapper">
                <span class="file-label-text" id="file-status-text">drag profile here or browse file</span>
                <input type="file" id="avatarUpload" accept="image/*" onchange="updateFileLabel()">
            </div>
        </div>
        
        <div style="margin-top: 30px;">
            <button onclick="joinGame()">join game</button>
        </div>
    </div>

    <div id="game-screen" class="container hidden">
        <div class="status-box" id="status-message">
            awaiting match matrix generation...
        </div>
        
        <div class="players-grid" id="players-list"></div>
        
        <div class="table-center">
            <p style="margin-top: 0; font-size: 0.75em; color: #555555; text-transform: lowercase;">active discard stack</p>
            <div class="discard-card" id="top-discard">-</div>
        </div>
        
        <div class="hand-container">
            <p style="margin-top: 0; font-size: 0.75em; color: #555555; text-transform: lowercase;">your card deck matrix</p>
            <div class="hand-cards" id="your-hand"></div>
        </div>
        
        <div class="action-bar">
            <button onclick="drawCard()">draw card matrix</button>
        </div>
    </div>

    <script>
        let gameState = null;

        // Visual update for file upload prompt field
        function updateFileLabel() {
            const fileInput = document.getElementById('avatarUpload');
            const label = document.getElementById('file-status-text');
            if (fileInput.files.length > 0) {
                label.innerText = fileInput.files[0].name.toLowerCase();
                label.style.color = '#ffffff';
            } else {
                label.innerText = 'drag profile here or browse file';
                label.style.color = '#666666';
            }
        }

        async function joinGame() {
            const username = document.getElementById('usernameInput').value;
            const email = document.getElementById('emailInput').value;
            const fileInput = document.getElementById('avatarUpload');
            
            let avatarSource = null;

            // Handle asset uploading conversion logic cleanly to string format
            if (fileInput.files.length > 0) {
                avatarSource = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }

            try {
                const response = await fetch('/api/start_game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        avatar_source: avatarSource
                    })
                });

                if (response.ok) {
                    gameState = await response.json();
                    document.getElementById('lobby-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                    renderGame();
                } else {
                    alert('Lobby entry request rejected by service pipeline.');
                }
            } catch (err) {
                console.error("Connection matrix error:", err);
                alert('Failed to contact backend server routing.');
            }
        }

        // Color mapper utility to translate token strings to theme colors
        function getColorHex(colorName) {
            switch(colorName.toLowerCase()) {
                case 'red': return '#e51c23';
                case 'blue': return '#1e88e5';
                case 'green': return '#43a047';
                case 'yellow': return '#fdd835';
                default: return '#7b1fa2'; // Wild color theme mapping
            }
        }

        function renderGame() {
            if (!gameState) return;

            // Handle terminal log/status box processing string references
            document.getElementById('status-message').innerText = gameState.status_message.toLowerCase();
            
            // Render Central Discard Target Card Stack
            const topCard = gameState.top_discard;
            const discardDiv = document.getElementById('top-discard');
            if (topCard) {
                discardDiv.innerText = topCard.value;
                discardDiv.style.borderColor = getColorHex(topCard.color);
                discardDiv.style.color = getColorHex(topCard.color);
            }

            // Render Active Registered Profiles / Bot Entities Matrix
            const playersGrid = document.getElementById('players-list');
            playersGrid.innerHTML = '';
            
            gameState.players.forEach((p, idx) => {
                const pNode = document.createElement('div');
                pNode.className = 'player-node';
                
                // Track turn state indicators dynamically
                if (gameState.current_turn === idx && !gameState.game_over) {
                    pNode.classList.add('active-turn');
                }
                
                // Process image asset structure mapping logic based on source depth
                let avatarLayout = '';
                if (p.avatar && p.avatar.length > 5) {
                    avatarLayout = `<img class="avatar-img" src="${p.avatar}" alt="pfp">`;
                } else {
                    avatarLayout = `<span class="avatar-fallback">${p.avatar || idx}</span>`;
                }
                
                pNode.innerHTML = `
                    <span class="player-name">${p.name.toLowerCase()}</span>
                    ${p.is_owner ? '<span class="owner-tag">[owner]</span>' : ''}
                    <div class="avatar-frame">
                        ${avatarLayout}
                    </div>
                    <span class="card-count">cards: ${p.card_count}</span>
                `;
                playersGrid.appendChild(pNode);
            });

            // Render Player Execution Hand Matrix Layout
            const handDiv = document.getElementById('your-hand');
            handDiv.innerHTML = '';
            
            const humanPlayer = gameState.players[0];
            if (humanPlayer && humanPlayer.hand) {
                humanPlayer.hand.forEach((card, idx) => {
                    const cardBtn = document.createElement('button');
                    cardBtn.className = 'game-card';
                    cardBtn.innerText = card.value;
                    cardBtn.style.borderColor = getColorHex(card.color);
                    cardBtn.style.color = getColorHex(card.color);
                    
                    // Route index parameters to play validation stack on request click
                    cardBtn.onclick = () => playCard(idx);
                    handDiv.appendChild(cardBtn);
                });
            }

            // If a bot turn state remains active, automatically route loop trigger after short fallback delay
            if (gameState.current_turn !== 0 && !gameState.game_over) {
                setTimeout(triggerAiTurn, 1400);
            }
        }

        async function playCard(cardIdx) {
            // Check turn priority locally before hitting connection streams
            if (gameState.current_turn !== 0) {
                alert("Wait for processing priority cycle to complete.");
                return;
            }

            try {
                const response = await fetch('/api/play_card', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ player_idx: 0, card_idx: cardIdx })
                });
                
                if (response.ok) {
                    gameState = await response.json();
                    renderGame();
                } else {
                    const err = await response.json();
                    alert(err.error || "Card processing assertion failure.");
                }
            } catch (err) {
                console.error("Card pipeline execution error:", err);
            }
        }

        async function drawCard() {
            if (gameState.current_turn !== 0) return;

            try {
                const response = await fetch('/api/draw_card', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ player_idx: 0 })
                });
                if (response.ok) {
                    gameState = await response.json();
                    renderGame();
                }
            } catch (err) {
                console.error("Stack pulling failure:", err);
            }
        }

        async function triggerAiTurn() {
            if (gameState.game_over) return;
            
            try {
                const response = await fetch('/api/ai_turn', { method: 'POST' });
                if (response.ok) {
                    gameState = await response.json();
                    renderGame();
                }
            } catch (err) {
                console.error("Bot thread automation skip:", err);
            }
        }
    </script>
</body>
</html>
